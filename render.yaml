services:
  - type: web
    name: trabajo-dsw-backend
    env: node
    branch: ORM
    rootDir: BackEnd
    plan: free
    buildCommand: npm install
    startCommand: npm start
  - type: web
    runtime: static
    name: trabajo-dsw-frontend
    branch: ORM
    rootDir: FrontEnd
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
